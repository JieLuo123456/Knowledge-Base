version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: knowledge_base_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    container_name: knowledge_base_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  qdrant_data:
